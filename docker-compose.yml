services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "3001:3001"
    env_file: ./.env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./packages/backend/src:/app/packages/backend/src
      - ./packages/backend/package.json:/app/packages/backend/package.json
      - ./packages/backend/drizzle.config.ts:/app/packages/backend/drizzle.config.ts
      - ./packages/shared/src:/app/packages/shared/src

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:3001
    depends_on:
      - backend
    volumes:
      - ./packages/frontend/src:/app/packages/frontend/src
      - ./packages/frontend/index.html:/app/packages/frontend/index.html
      - ./packages/frontend/vite.config.ts:/app/packages/frontend/vite.config.ts
      - ./packages/frontend/tsconfig.json:/app/packages/frontend/tsconfig.json
      - ./packages/frontend/tsconfig.app.json:/app/packages/frontend/tsconfig.app.json
      - ./packages/frontend/components.json:/app/packages/frontend/components.json
      - ./packages/frontend/package.json:/app/packages/frontend/package.json
      - ./packages/shared/src:/app/packages/shared/src

volumes:
  pgdata:
